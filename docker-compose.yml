version: "3.8"

services:
  # ── FastAPI Backend ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: srl-backend
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - srl-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend (Nginx) ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_BASE_URL: ""
    container_name: srl-frontend
    ports:
      - "3000:80"
    networks:
      - srl-network
    depends_on:
      - backend
    restart: unless-stopped

networks:
  srl-network:
    driver: bridge
